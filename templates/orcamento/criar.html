<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFX Finance — Criar Orçamento</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/nav.css">
    <script src="/static/js/nav.js" defer></script>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="alertas-container">
                {% for category, message in messages %}
                    <div class="alerta {{ category }}">
                        <span>{{ message }}</span>
                        <button onclick="this.parentElement.remove()" class="fechar-alerta">&times;</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <header>
        <strong>OFX <span style="color:#1d6ae5;">Finance</span></strong>
        <button class="hamburger" id="hamburger-btn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <nav>
            <a href="/importar" class="btn-nav">Importar OFX</a>
            <a href="/dashboard" class="btn-nav">Dashboard</a>
            <a href="/orcamentos" class="btn-nav">Orçamentos</a>
            <a href="/metas" class="btn-nav">Metas</a>
            <a href="/logout" class="btn-logout" title="Sair da conta">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </nav>
    </header>

    <main class="container" style="max-width:480px;margin-top:40px;">
        <div class="card" style="flex-direction:column;gap:16px;padding:32px;">
            <form action="/orcamentos/criar" method="post" style="display:flex;flex-direction:column;gap:16px;">
                <label>Mês (1–12)
                    <input type="number" name="mes" min="1" max="12" required style="width:100%;margin-top:4px;padding:8px;border:1px solid #ddd;border-radius:6px;">
                </label>
                <label>Ano
                    <input type="number" name="ano" required style="width:100%;margin-top:4px;padding:8px;border:1px solid #ddd;border-radius:6px;">
                </label>
                <label>Valor previsto (R$)
                    <input type="number" name="valor" step="0.01" min="0" required style="width:100%;margin-top:4px;padding:8px;border:1px solid #ddd;border-radius:6px;">
                </label>
                <button type="submit" class="btn-nav" style="align-self:flex-start;">Criar</button>
            </form>
        </div>
    </main>
</body>
</html>
